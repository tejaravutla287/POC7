---
- name: Deploy Docker Container
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Stop existing container
      docker_container:
        name: my-poc-container
        state: absent
      ignore_errors: yes
 
    - name: Run new container
      docker_container:
        name: my-poc-container
        image: "my-poc-app:{{ lookup('env', 'BUILD_NUMBER') }}"
        state: started
        restart_policy: always
        published_ports:
          - "8081:80"
